name: VRT
on:
  workflow_dispatch:

jobs:
  vrt:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: "Build VRT image"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: e2e/vrt/Dockerfile
          load: true
          tags: zero-one-ui-vrt
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Run VRT"
        run: docker compose -f e2e/vrt/compose.yml run --rm vrt pnpm playwright test --config playwright-vrt.config.ts

      - name: "Upload report"
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: vrt-report
          path: |
            playwright-report
            test-results
          retention-days: 7
