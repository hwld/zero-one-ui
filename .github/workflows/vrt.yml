name: VRT
on:
  workflow_dispatch:

jobs:
  vrt:
    runs-on: ubuntu-24.04
    # ローカルのDocker環境と同じPlaywright公式イメージを使用して
    # フォントやブラウザ環境を統一する
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Run VRT"
        run: pnpm vrt:ci

      - name: "Upload report"
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vrt-report
          path: |
            playwright-report
            test-results
          retention-days: 7
